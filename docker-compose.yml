services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: transposerx
      POSTGRES_PASSWORD: transposerx
      POSTGRES_DB: transposerx
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: transposerx
      POSTGRES_PASSWORD: transposerx
      POSTGRES_DB: transposerx_test
    ports:
      - "5434:5432"

volumes:
  postgres_data:
